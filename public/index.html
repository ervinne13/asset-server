<!DOCTYPE html>
<html lang="en" class="sl-theme-dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asset Server</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
  <link rel="stylesheet" href="/style.css" />
  <script>
    const _sizes = [290, 480, 700];
    const _idx = Math.min(parseInt(localStorage.getItem('panelSizeIdx') || '0', 10), _sizes.length - 1);
    document.documentElement.style.setProperty('--panel-right', _sizes[_idx] + 'px');
  </script>
  <link rel="modulepreload" href="/app.js" />
  <link rel="modulepreload" href="/modules/state.js" />
  <link rel="modulepreload" href="/modules/api.js" />
  <link rel="modulepreload" href="/modules/helpers.js" />
  <link rel="modulepreload" href="/modules/preview.js" />
  <link rel="modulepreload" href="/modules/selection.js" />
  <link rel="modulepreload" href="/modules/files.js" />
  <link rel="modulepreload" href="/modules/router.js" />
  <link rel="modulepreload" href="/modules/bookmarks.js" />
  <link rel="modulepreload" href="/modules/search.js" />
  <link rel="modulepreload" href="/modules/move.js" />
  <link rel="modulepreload" href="/modules/trash.js" />
  <link rel="modulepreload" href="/modules/keyboard.js" />
  <link rel="modulepreload" href="/modules/lightbox.js" />
  <link rel="modulepreload" href="/modules/mobile.js" />
  <link rel="modulepreload" href="/modules/tags.js" />
  <link rel="modulepreload" href="/modules/prompt.js" />
  <link rel="modulepreload" href="/modules/generate.js" />
  <link rel="modulepreload" href="/modules/comfyui-status.js" />
  <link rel="modulepreload" href="/modules/zit.js" />
</head>
<body>
  <div class="shell">

    <!-- ── Left: Bookmarks ── -->
    <aside class="panel-left" id="panel-left">
      <div class="sidebar-header">
        <span>Asset Server</span>
        <sl-icon-button id="btn-add-bookmark" name="bookmark-plus" title="Bookmark current folder"></sl-icon-button>
        <sl-icon-button id="btn-close-sidebar" name="x-lg" title="Close" class="btn-close-sidebar"></sl-icon-button>
      </div>

      <div class="sidebar-section-label">Quick Access</div>
      <button class="sidebar-item staging" id="btn-staging">
        <sl-icon name="lightning-charge-fill"></sl-icon>
        Staging
      </button>
      <button class="sidebar-item" id="btn-library">
        <sl-icon name="folder2"></sl-icon>
        Library Root
      </button>

      <div class="sidebar-section-label">AI</div>
      <button class="sidebar-item" id="btn-zit-txt2img">
        <sl-icon name="stars"></sl-icon>
        ZIT Txt2Img
      </button>

      <div class="sidebar-section-label">Bookmarks</div>
      <div id="bookmark-list"></div>

      <div id="comfyui-status" class="comfyui-status" title="ComfyUI status">
        <span class="comfyui-dot"></span>
        <span class="comfyui-label"></span>
      </div>
    </aside>

    <!-- ── Middle: Explorer ── -->
    <main class="panel-main">
      <div class="toolbar">
        <sl-icon-button id="btn-hamburger" name="list" title="Menu" class="btn-hamburger"></sl-icon-button>
        <sl-breadcrumb id="breadcrumb"></sl-breadcrumb>
        <div class="toolbar-right">
          <sl-icon-button id="btn-view-grid" name="grid-3x3-gap" title="Gallery view" class="btn-desktop-only"></sl-icon-button>
          <sl-icon-button id="btn-view-list" name="list-ul" title="List view" class="btn-desktop-only"></sl-icon-button>
          <sl-divider vertical style="height:20px;margin:0 4px" class="btn-desktop-only"></sl-divider>
          <sl-icon-button id="btn-search-open" name="search" title="Search library index"></sl-icon-button>
          <sl-button id="btn-rebuild-index" size="small" title="Rebuild library search index" class="btn-desktop-only">
            <sl-icon slot="prefix" name="arrow-clockwise"></sl-icon>
            Index
          </sl-button>
        </div>
      </div>

      <div id="search-bar" class="search-bar" style="display:none">
        <sl-input id="search-input" placeholder="Search library index…" clearable size="small" style="flex:1">
          <sl-icon slot="prefix" name="search"></sl-icon>
        </sl-input>
        <sl-button size="small" variant="text" id="btn-search-close">✕</sl-button>
      </div>

      <div id="file-grid" class="file-grid view-grid"></div>
    </main>

    <!-- ── Right: Preview ── -->
    <aside class="panel-right">
      <div class="panel-right-header">
        <span>Preview</span>
        <sl-icon-button id="btn-expand-panel" name="layout-sidebar-reverse" title="Expand panel"></sl-icon-button>
      </div>
      <div id="bulk-panel" class="bulk-panel" style="display:none">
        <div class="bulk-count" id="bulk-count"></div>
        <div class="preview-actions">
          <button class="action-btn" id="btn-bulk-move">
            <sl-icon name="folder-symlink"></sl-icon> Move all
          </button>
          <button class="action-btn danger" id="btn-bulk-delete">
            <sl-icon name="trash"></sl-icon> Delete all
          </button>
        </div>
      </div>
      <div id="folder-panel" class="preview-content" style="display:none">
        <div class="preview-media-wrap">
          <sl-icon name="folder2" class="preview-folder-icon"></sl-icon>
        </div>
        <div class="preview-meta">
          <div class="preview-name" id="folder-panel-name"></div>
          <div class="preview-info" id="folder-panel-info"></div>
        </div>
        <div class="preview-actions" id="folder-panel-actions">
          <button class="action-btn" id="btn-new-folder">
            <sl-icon name="folder-plus"></sl-icon> New folder
          </button>
          <button class="action-btn" id="btn-open-in-os">
            <sl-icon name="folder2-open"></sl-icon> Open in OS
          </button>
          <button class="action-btn danger" id="btn-delete-folder" style="display:none">
            <sl-icon name="trash"></sl-icon> Delete folder
          </button>
        </div>
      </div>
      <div id="preview-empty" class="preview-empty">
        <sl-icon name="image" style="font-size:3rem;opacity:0.15"></sl-icon>
        <span>Select a file</span>
      </div>
      <div id="preview-content" class="preview-content" style="display:none">
        <div class="preview-media-wrap" id="preview-media-wrap">
          <img id="preview-img" src="" alt="" />
          <video id="preview-video" controls loop style="display:none"></video>
          <div id="preview-toolbar" class="preview-toolbar" style="display:none">
            <div class="preview-toolbar-left">
              <button id="btn-copy-file" class="toolbar-btn" title="Copy to clipboard">
                <sl-icon name="clipboard"></sl-icon>
              </button>
              <button id="btn-tag-open" class="toolbar-btn" title="Edit tags">
                <sl-icon name="tag"></sl-icon>
              </button>
              <button id="btn-prompt-open" class="toolbar-btn" title="Show workflow prompts" style="display:none">
                <sl-icon name="stars"></sl-icon>
              </button>
              <button id="btn-generate-open" class="toolbar-btn" title="Edit with Qwen AI" style="display:none">
                <sl-icon name="pencil-fill"></sl-icon>
              </button>
            </div>
            <div class="preview-toolbar-right">
              <button id="btn-preview-trash" class="toolbar-btn toolbar-btn-danger" title="Delete">
                <sl-icon name="trash"></sl-icon>
              </button>
            </div>
          </div>
        </div>
        <div class="preview-meta">
          <div class="preview-name" id="preview-name"></div>
          <div class="preview-info" id="preview-info"></div>
        </div>
        <div class="preview-actions">
          <a id="btn-download" class="action-btn primary" download>
            <sl-icon name="download"></sl-icon> Download
          </a>
          <button class="action-btn" id="btn-move">
            <sl-icon name="folder-symlink"></sl-icon> Move to…
          </button>
          <button class="action-btn danger" id="btn-delete">
            <sl-icon name="trash"></sl-icon> Delete
          </button>
        </div>
      </div>
    </aside>

  </div>

  <!-- ── Mobile sidebar overlay ── -->
  <div id="mobile-overlay" class="mobile-overlay"></div>

  <!-- ── Move Dialog ── -->
  <sl-dialog label="Move to…" id="move-dialog" style="--width:480px">
    <div class="move-dest-label">Destination: <span id="move-dest-display">—</span></div>
    <sl-tree id="move-tree" selection="single"></sl-tree>
    <div slot="footer" style="display:flex;gap:8px;align-items:center;width:100%">
      <sl-button variant="default" id="btn-new-folder-move" style="margin-right:auto">
        <sl-icon slot="prefix" name="folder-plus"></sl-icon>New folder here
      </sl-button>
      <sl-button variant="default" id="btn-move-cancel">Cancel</sl-button>
      <sl-button variant="primary" id="btn-move-confirm">Move Here</sl-button>
    </div>
  </sl-dialog>

  <!-- ── Prompt Dialog ── -->
  <sl-dialog label="Workflow Prompts" id="prompt-dialog" style="--width:520px">
    <div id="prompt-content" class="prompt-content"></div>
    <div slot="footer" style="display:flex;justify-content:flex-end">
      <sl-button variant="primary" id="btn-prompt-close">Close</sl-button>
    </div>
  </sl-dialog>

  <!-- ── Tag Dialog ── -->
  <sl-dialog label="Tags" id="tag-dialog" style="--width:420px">
    <div id="tag-chips" class="tag-chips"></div>
    <div class="tag-input-wrap">
      <input id="tag-input" class="tag-input" placeholder="Add tag… (Enter or ,)" autocomplete="off" />
      <div id="tag-suggestions" class="tag-suggestions" style="display:none"></div>
    </div>
    <div slot="footer" style="display:flex;justify-content:flex-end">
      <sl-button variant="primary" id="btn-tag-done">Done</sl-button>
    </div>
  </sl-dialog>

  <!-- ── Generate Page (full-screen overlay) ── -->
  <div id="generate-page" class="generate-page" style="display:none">
    <div class="gen-header">
      <button id="gen-back" class="gen-back-btn" title="Cancel">
        <sl-icon name="arrow-left"></sl-icon>
      </button>
      <span class="gen-title">Edit with Qwen</span>
      <span id="gen-status" class="gen-status"></span>
    </div>
    <div class="gen-content">
      <div class="gen-img-wrap">
        <img id="gen-img" src="" alt="" />
      </div>
      <div class="gen-right">
        <div class="gen-body">
          <label class="gen-label">Edit prompt</label>
          <textarea id="gen-positive" class="gen-textarea" placeholder="Describe the scene or edit…"></textarea>
          <details class="gen-advanced">
            <summary>Advanced options</summary>
            <div class="gen-advanced-body">
              <label class="gen-label">Negative prompt</label>
              <textarea id="gen-negative" class="gen-textarea gen-textarea-sm" rows="3"></textarea>
              <label class="gen-label">Seed <small>(blank = random)</small></label>
              <input id="gen-seed" type="number" class="gen-seed-input" placeholder="random" />
            </div>
          </details>
        </div>
        <div class="gen-footer">
          <sl-button variant="primary" id="btn-gen-submit" size="large" style="width:100%">
            <sl-icon slot="prefix" name="pencil-fill"></sl-icon>Generate
          </sl-button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── ZIT Txt2Img Page (full-screen overlay) ── -->
  <div id="zit-page" class="zit-page" style="display:none">
    <div class="gen-header">
      <button id="zit-back" class="gen-back-btn" title="Back">
        <sl-icon name="arrow-left"></sl-icon>
      </button>
      <span class="gen-title">ZIT Txt2Img</span>
      <span id="zit-status" class="gen-status"></span>
    </div>
    <div class="zit-content">
      <div class="zit-inner">

        <!-- Saved prompts -->
        <div class="zit-section">
          <div class="zit-section-header">
            <sl-icon name="bookmark"></sl-icon>
            <span>Saved Prompts</span>
          </div>
          <div id="zit-saved-list" class="zit-saved-list"></div>
        </div>

        <!-- Recent history -->
        <div class="zit-section" id="zit-recent-section" style="display:none">
          <div class="zit-section-header">
            <sl-icon name="clock-history"></sl-icon>
            <span>Recent</span>
          </div>
          <div id="zit-recent-list" class="zit-recent-list"></div>
        </div>

        <!-- Textarea -->
        <div class="zit-textarea-wrap">
          <textarea id="zit-prompt" class="zit-textarea" placeholder="Describe the image in detail…" spellcheck="true"></textarea>
          <button id="zit-paste" class="zit-paste-btn" title="Paste from clipboard">
            <sl-icon name="clipboard"></sl-icon>
          </button>
        </div>

        <!-- Batch count -->
        <div class="zit-batch-row">
          <span class="zit-batch-label">Count</span>
          <sl-radio-group id="zit-count" value="1" size="small">
            <sl-radio-button value="1">1</sl-radio-button>
            <sl-radio-button value="2">2</sl-radio-button>
            <sl-radio-button value="3">3</sl-radio-button>
            <sl-radio-button value="4">4</sl-radio-button>
          </sl-radio-group>
        </div>

        <!-- Title row (save mode only) -->
        <div id="zit-title-row" class="zit-title-row" style="display:none">
          <input id="zit-title" type="text" class="zit-title-input" placeholder="Prompt title (required to save)" />
          <button id="zit-save-mode-cancel" class="zit-save-cancel" title="Cancel save mode">&times;</button>
        </div>

        <!-- Split submit button -->
        <div class="zit-submit-group">
          <sl-button variant="primary" id="btn-zit-submit" size="large" class="zit-submit-btn">
            <sl-icon slot="prefix" name="stars"></sl-icon>Generate
          </sl-button>
          <sl-dropdown id="zit-submit-menu" placement="top-end">
            <sl-button slot="trigger" variant="primary" size="large" class="zit-menu-btn">
              <sl-icon id="zit-caret-icon" name="chevron-down"></sl-icon>
            </sl-button>
            <sl-menu>
              <sl-menu-item id="zit-menu-save-generate">
                <sl-icon slot="prefix" name="bookmark-plus"></sl-icon>
                Save Prompt &amp; Generate
              </sl-menu-item>
            </sl-menu>
          </sl-dropdown>
        </div>

      </div>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
